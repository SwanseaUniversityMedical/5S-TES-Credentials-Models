name: Sonar

on:
  pull_request:
    # Only consider PRs that change files for this asset, including ci scripts
    paths:
      - ".github/workflows/sonar.yaml"
      - "./**"
  push:
    # Only release off of release and maintenance branches for this asset
    branches:
      - "main"
    # Only consider pushes that change files for this asset, including ci scripts
    paths:
      - ".github/workflows/sonar.yaml"
      - "./**"

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel early on pull requests if new commits are added,
  # Don't cancel on release pushes
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  scan-code:
    uses: SwanseaUniversityMedical/workflows/.github/workflows/generic-sonar.yaml@v1.2.2-generic-sonar
    with:
      sonar-url: ${{ vars.FEDA_SONAR_HOST_URL }}
      project-key: 5S-TES-Credentials-Models
    secrets:
      sonar-token: ${{ secrets.FEDA_SONAR_TOKEN }}
